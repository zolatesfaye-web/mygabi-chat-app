<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGabi Chat App</title>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #075e54; height: 100vh; display: flex; flex-direction: column; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 20px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #e5ddd5; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 16px; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>MyGabi Chat Pro</header>
<div id="chat-box"></div>
<div class="input-area">
    <input type="text" id="msgInput" placeholder="መልእክት ይጻፉ...">
    <button onclick="send()">ላክ</button>
</div>

<script>
    // Firebase Config (የአንተን apiKey እዚህ ጋር አስገባ)
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "mygabi-chat.firebaseapp.com",
        projectId: "mygabi-chat",
        appId: "1:688929290298:web:..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let user = localStorage.getItem('user') || prompt("ስምዎት?") || "Guest";
    localStorage.setItem('user', user);

    function send() {
        const text = document.getElementById('msgInput').value;
        if(text) {
            db.collection("messages").add({
                text: text, user: user, time: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        }
    }

    db.collection("messages").orderBy("time").onSnapshot(snap => {
        const box = document.getElementById('chat-box');
        box.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const div = document.createElement('div');
            div.className = `msg ${d.user === user ? 'sent' : 'received'}`;
            div.innerHTML = `<b>${d.user}:</b><br>${d.text}`;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
