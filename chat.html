<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGabi Chat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Helvetica, sans-serif; background-color: #e5ddd5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 16px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.15); word-wrap: break-word; cursor: pointer; }
        .sent { align-self: flex-end; background-color: #dcf8c6; border-top-right-radius: 0; }
        .received { align-self: flex-start; background-color: white; border-top-left-radius: 0; }
        
        .user-name { display: block; font-size: 11px; font-weight: bold; color: #075e54; margin-bottom: 2px; }
        .time { display: block; font-size: 10px; text-align: right; color: #888; margin-top: 4px; }
        
        .input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        input { flex: 1; padding: 12px 18px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

  
<header>MyGabi Chat Pro</header>
<div id="chat-box"></div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="መልእክት ይጻፉ..." autocomplete="off">
    <button onclick="sendMessage()">ላክ</button>
</div>

<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<script>
    // Firebase Config (ያንተን መረጃ እዚህ አስገባ)
    const firebaseConfig = {
        apiKey: "AIzaSyBBf70aTFzyH0zVS2a-Xy9uKMjz...", 
        authDomain: "mygabi-chat.firebaseapp.com",
        projectId: "mygabi-chat",
        storageBucket: "mygabi-chat.firebasestorage.app",
        messagingSenderId: "688929290298",
        appId: "1:688929290298:web:a52add4cefb7f4...",
        measurementId: "G-934LZGZV5L"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const sound = document.getElementById('notifSound');

    let userName = localStorage.getItem('chat_name') || prompt("እባክዎ ስምዎን ያስገቡ:") || "Guest";
    localStorage.setItem('chat_name', userName);

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('messageInput');

    function sendMessage() {
        const text = messageInput.value.trim();
        if (text !== "") {
            db.collection("messages").add({
                text: text,
                user: userName,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            messageInput.value = "";
        }
    }

    // መልእክት ለማጥፋት
    function deleteMsg(id, user) {
        if (user === userName) {
            if (confirm("ይህ መልእክት ይጥፋ?")) {
                db.collection("messages").doc(id).delete();
            }
        }
    }

    let firstLoad = true;
    db.collection("messages").orderBy("createdAt").onSnapshot(snapshot => {
        chatBox.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            const isMe = data.user === userName;
            const time = data.createdAt ? data.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.onclick = () => deleteMsg(id, data.user);
            div.innerHTML = `
                <span class="user-name">${data.user} ${isMe ? '(አንተ)' : ''}</span>
                <span>${data.text}</span>
                <span class="time">${time}</span>
            `;
            chatBox.appendChild(div);
        });
        
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // አዲስ መልእክት ሲመጣ ድምፅ እንዲያሰማ
        if (!firstLoad && snapshot.docChanges().some(change => change.type === "added")) {
            sound.play().catch(e => console.log("Sound error"));
        }
        firstLoad = false;
    });

    messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
